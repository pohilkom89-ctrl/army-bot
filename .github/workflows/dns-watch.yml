name: DNS watch armybots.ru

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dns-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already notified
        id: marker
        run: |
          if [ -f .dns-notified ]; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Marker .dns-notified exists — skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve via 8.8.8.8 and 1.1.1.1
        if: steps.marker.outputs.already == 'false'
        id: resolve
        run: |
          IP_GOOGLE=$(dig +short armybots.ru @8.8.8.8 | tail -n1)
          IP_CLOUD=$(dig  +short armybots.ru @1.1.1.1 | tail -n1)
          echo "google=${IP_GOOGLE}"        >> "$GITHUB_OUTPUT"
          echo "cloudflare=${IP_CLOUD}"     >> "$GITHUB_OUTPUT"
          echo "Google 8.8.8.8     -> '${IP_GOOGLE}'"
          echo "Cloudflare 1.1.1.1 -> '${IP_CLOUD}'"

      - name: Notify Telegram + create marker
        if: |
          steps.marker.outputs.already == 'false' &&
          steps.resolve.outputs.google == '45.12.73.106' &&
          steps.resolve.outputs.cloudflare == '45.12.73.106'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN_NOTIFICATIONS }}
          CHAT_ID:   ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          set -euo pipefail
          NOW_UTC=$(date -u +%FT%TZ)
          MSG="✅ DNS armybots.ru пропагирован!
          Google (8.8.8.8) → 45.12.73.106
          Cloudflare (1.1.1.1) → 45.12.73.106
          UTC: ${NOW_UTC}

          Дальше: Caddy + HTTPS"

          curl -sS --fail-with-body \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d disable_web_page_preview=true \
            > /dev/null

          touch .dns-notified
          git config user.name  "armybots-bot"
          git config user.email "armybots-bot@users.noreply.github.com"
          git add .dns-notified
          git commit -m "dns: notification sent (armybots.ru → 45.12.73.106)"
          git pull --rebase origin main || true
          git push origin HEAD:main
