services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: botfactory_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: botfactory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d botfactory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    container_name: botfactory_redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6379:6379"

volumes:
  pgdata:
